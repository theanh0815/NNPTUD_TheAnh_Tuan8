version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/NNPTUD-C5
    depends_on:
      - mongo

  mongo:
    image: mongo:6-jammy
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
